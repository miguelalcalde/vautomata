services:
  postgres:
    image: postgres:16-alpine
    container_name: vautomata-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: workflow
    ports:
      - "5432:5432"
    volumes:
      - vautomata_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d workflow"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  vautomata_pgdata:
